# ─────────────────────────────────────────────────────────────────────────────
# Wisdom Cognitive Runtime — Cloud Build CI/CD Pipeline
#
# Triggered on push to `main` branch.
# Builds and deploys all 9 microservices in the correct dependency order.
#
# Dependency order:
#   Protobuf → Go services (parallel) → Python ADK Router → Portal → Deploy
#
# Image naming convention:
#   {REGION}-docker.pkg.dev/{PROJECT_ID}/wisdom-repo/wisdom-{service}:latest
# ─────────────────────────────────────────────────────────────────────────────

substitutions:
  _REGION: us-central1
  _REPO: wisdom-repo

steps:

  # ─── Phase 1: Generate Protobufs ──────────────────────────────────────────
  - id: gen-protos
    name: golang:1.24-bookworm
    entrypoint: bash
    dir: wisdom
    args:
      - -c
      - |
        apt-get update -qq && apt-get install -y -qq protobuf-compiler
        go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
        export PATH="$$PATH:$$(go env GOPATH)/bin"
        echo "→ Generating protobufs..."
        protoc --go_out=. --go_opt=module=github.com/google/wisdom \
               --go-grpc_out=. --go-grpc_opt=module=github.com/google/wisdom \
               proto/cortex.proto proto/thalamus.proto proto/mastery.proto \
               proto/researcher.proto proto/curriculum.proto proto/integrations.proto \
               proto/entity.proto proto/pubsub_events.proto
        # Remove manual stubs — protoc output takes precedence.
        find pkg -name 'stubs.go' -delete || true
        echo "✓ Protobufs generated"

  # ─── Phase 2: Go Build Verification ──────────────────────────────────────
  - id: go-build-check
    name: golang:1.24-bookworm
    dir: wisdom
    entrypoint: bash
    args:
      - -c
      - |
        echo "→ Verifying go build ./..."
        go build ./...
        echo "✓ Go build clean"
    waitFor: [gen-protos]

  # ─── Phase 3: Build Go Service Images (parallel) ─────────────────────────
  - id: build-cortex
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-cortex:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-cortex:latest
      - -f
      - wisdom/Dockerfile.cortex
      - ./wisdom
    waitFor: [go-build-check]

  - id: build-thalamus
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-thalamus:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-thalamus:latest
      - -f
      - wisdom/Dockerfile.thalamus
      - ./wisdom
    waitFor: [go-build-check]

  - id: build-mastery
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-mastery:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-mastery:latest
      - -f
      - wisdom/Dockerfile.mastery
      - ./wisdom
    waitFor: [go-build-check]

  - id: build-researcher
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-researcher:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-researcher:latest
      - -f
      - wisdom/Dockerfile.researcher
      - ./wisdom
    waitFor: [go-build-check]

  - id: build-curriculum
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-curriculum:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-curriculum:latest
      - -f
      - wisdom/Dockerfile.curriculum
      - ./wisdom
    waitFor: [go-build-check]

  - id: build-integrations
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-integrations:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-integrations:latest
      - -f
      - wisdom/Dockerfile.integrations
      - ./wisdom
    waitFor: [go-build-check]

  - id: build-entity
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-entity:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-entity:latest
      - -f
      - wisdom/Dockerfile.entity
      - ./wisdom
    waitFor: [go-build-check]

  # ─── Phase 4: Build Python ADK Router ────────────────────────────────────
  - id: build-adk-router
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-adk-router:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-adk-router:latest
      - ./adk-router
    waitFor: ['-']  # Can build in parallel with Go services.

  # ─── Phase 5: Push All Images (parallel) ─────────────────────────────────
  - id: push-cortex
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-cortex]
    waitFor: [build-cortex]

  - id: push-thalamus
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-thalamus]
    waitFor: [build-thalamus]

  - id: push-mastery
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-mastery]
    waitFor: [build-mastery]

  - id: push-researcher
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-researcher]
    waitFor: [build-researcher]

  - id: push-curriculum
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-curriculum]
    waitFor: [build-curriculum]

  - id: push-integrations
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-integrations]
    waitFor: [build-integrations]

  - id: push-entity
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-entity]
    waitFor: [build-entity]

  - id: push-adk-router
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-adk-router]
    waitFor: [build-adk-router]

  # ─── Phase 6: Deploy to Cloud Run (dependency order) ─────────────────────
  # Cortex first (all services depend on it).
  - id: deploy-cortex
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - wisdom-cortex
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-cortex:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --no-traffic        # Deploy new revision without traffic.
      - --tag=canary
    waitFor: [push-cortex]

  - id: promote-cortex
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - wisdom-cortex
      - --to-latest
      - --region=${_REGION}
    waitFor: [deploy-cortex]

  # Deploy all other Go services in parallel (after Cortex is live).
  - id: deploy-mastery
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args: [run, deploy, wisdom-mastery, --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-mastery:$SHORT_SHA, --region=${_REGION}, --platform=managed]
    waitFor: [push-mastery, promote-cortex]

  - id: deploy-researcher
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args: [run, deploy, wisdom-researcher, --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-researcher:$SHORT_SHA, --region=${_REGION}, --platform=managed]
    waitFor: [push-researcher, promote-cortex]

  - id: deploy-curriculum
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args: [run, deploy, wisdom-curriculum, --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-curriculum:$SHORT_SHA, --region=${_REGION}, --platform=managed]
    waitFor: [push-curriculum, promote-cortex]

  - id: deploy-integrations
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args: [run, deploy, wisdom-integrations, --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-integrations:$SHORT_SHA, --region=${_REGION}, --platform=managed]
    waitFor: [push-integrations, promote-cortex]

  - id: deploy-entity
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args: [run, deploy, wisdom-entity, --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-entity:$SHORT_SHA, --region=${_REGION}, --platform=managed]
    waitFor: [push-entity, promote-cortex]

  # ADK Router after Mastery + Integrations are ready.
  - id: deploy-adk-router
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args: [run, deploy, wisdom-adk-router, --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-adk-router:$SHORT_SHA, --region=${_REGION}, --platform=managed]
    waitFor: [push-adk-router, deploy-mastery, deploy-integrations]

  # Thalamus last (the public gateway — only live when backend is ready).
  - id: deploy-thalamus
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args: [run, deploy, wisdom-thalamus, --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-thalamus:$SHORT_SHA, --region=${_REGION}, --platform=managed]
    waitFor:
      - push-thalamus
      - deploy-adk-router
      - deploy-curriculum
      - deploy-entity
      - deploy-researcher

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-cortex:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-thalamus:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-mastery:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-researcher:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-curriculum:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-integrations:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-entity:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-adk-router:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8     # Parallel builds need more CPU.
  substitutionOption: ALLOW_LOOSE

timeout: 1800s  # 30 minutes for the full pipeline.
