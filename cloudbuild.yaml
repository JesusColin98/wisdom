steps:
# 1. Compile Protobufs for Go
- name: 'golang:1.25'
  entrypoint: 'bash'
  dir: 'wisdom' # Execute inside the Go directory
  args: 
    - '-c'
    - |
      apt-get update && apt-get install -y protobuf-compiler
      go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      export PATH="$PATH:$(go env GOPATH)/bin"
      protoc --go_out=. --go_opt=paths=source_relative --go-grpc_out=. --go-grpc_opt=paths=source_relative proto/cortex.proto proto/thalamus.proto
      
      # We override the stubs just to ensure protoc outputs take precedence
      rm -f pkg/cortex/v1/stubs.go pkg/thalamus/v1/stubs.go || true

# 2. Build the Cortex Substrate (Go gRPC)
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-cortex:latest', '-f', 'wisdom/Dockerfile.cortex', './wisdom']

# 3. Build the Thalamus Gateway (Go gRPC)
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-thalamus:latest', '-f', 'wisdom/Dockerfile.thalamus', './wisdom']

# 4. Build the Cerebellum Worker (Go)
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-cerebellum:latest', '-f', 'wisdom/Dockerfile.cerebellum', './wisdom']

# 5. Build the Researcher Job (Go)
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-researcher:latest', '-f', 'wisdom/Dockerfile.researcher', './wisdom']

# 6. Build the chat service (Python Voice Proxy)
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-chat:latest', './chat_service']

# 7. Push the Cortex image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-cortex:latest']

# 8. Push the Thalamus image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-thalamus:latest']

# 9. Push the Cerebellum image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-cerebellum:latest']

# 10. Push the Researcher image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-researcher:latest']

# 11. Push the Chat image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-chat:latest']

images:
- 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-cortex:latest'
- 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-thalamus:latest'
- 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-cerebellum:latest'
- 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-researcher:latest'
- 'us-central1-docker.pkg.dev/${PROJECT_ID}/wisdom-repo/wisdom-chat:latest'

options:
  logging: CLOUD_LOGGING_ONLY
