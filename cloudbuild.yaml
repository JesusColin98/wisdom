substitutions:
  _REGION: us-central1
  _REPO: wisdom-repo

steps:

  # ─── Phase 1: Generate Protobufs ──────────────────────────────────────────
  - id: gen-protos
    name: golang:1.26.3-bookworm
    entrypoint: bash
    dir: wisdom
    args:
      - -c
      - |
        apt-get update -qq && apt-get install -y -qq protobuf-compiler
        go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
        go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
        export PATH="$$PATH:$$(go env GOPATH)/bin"
        echo "Generating protobufs..."
        protoc --go_out=. --go_opt=module=github.com/google/wisdom \
               --go-grpc_out=. --go-grpc_opt=module=github.com/google/wisdom \
               proto/cortex.proto proto/thalamus.proto proto/mastery.proto \
               proto/researcher.proto proto/curriculum.proto proto/integrations.proto \
               proto/entity.proto proto/pubsub_events.proto
        find pkg -name 'stubs.go' -delete || true
        echo "Protobufs generated"

  # ─── Phase 2: Go Build Verification ──────────────────────────────────────
  - id: go-build-check
    name: golang:1.26.3-bookworm
    dir: wisdom
    entrypoint: bash
    args:
      - -c
      - |
        echo "Verifying go build..."
        go build ./...
        echo "Go build clean"
    waitFor:
      - gen-protos

  # ─── Phase 3: Build Go Service Images (parallel) ─────────────────────────
  - id: build-cortex
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-cortex:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-cortex:latest
      - -f
      - wisdom/Dockerfile.cortex
      - ./wisdom
    waitFor:
      - go-build-check

  - id: build-thalamus
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-thalamus:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-thalamus:latest
      - -f
      - wisdom/Dockerfile.thalamus
      - ./wisdom
    waitFor:
      - go-build-check

  - id: build-mastery
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-mastery:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-mastery:latest
      - -f
      - wisdom/Dockerfile.mastery
      - ./wisdom
    waitFor:
      - go-build-check

  - id: build-researcher
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-researcher:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-researcher:latest
      - -f
      - wisdom/Dockerfile.researcher
      - ./wisdom
    waitFor:
      - go-build-check

  - id: build-curriculum
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-curriculum:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-curriculum:latest
      - -f
      - wisdom/Dockerfile.curriculum
      - ./wisdom
    waitFor:
      - go-build-check

  - id: build-integrations
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-integrations:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-integrations:latest
      - -f
      - wisdom/Dockerfile.integrations
      - ./wisdom
    waitFor:
      - go-build-check

  - id: build-entity
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-entity:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-entity:latest
      - -f
      - wisdom/Dockerfile.entity
      - ./wisdom
    waitFor:
      - go-build-check

  # ─── Phase 4: Build Python Services (parallel, no Go dependency) ───────────
  - id: build-adk-router
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-adk-router:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-adk-router:latest
      - ./adk-router

  - id: build-chat-service
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-chat-service:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-chat-service:latest
      - ./chat_service

  # ─── Phase 4b: Build Portal (Node → Nginx image) ─────────────────────────
  # Note: VITE env vars with live Cloud Run URLs are injected at deploy time
  # via the deploy-portal step (build arg pattern). A placeholder build is
  # done here; the final URL injection happens during the deploy step.
  - id: build-portal
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal:latest
      - --build-arg
      - VITE_ENGINE_URL=__CORTEX_URL__
      - --build-arg
      - VITE_AGENT_URL=__CHAT_URL__
      - --build-arg
      - VITE_ENGINE_WS_URL=__CORTEX_WS_URL__
      - --build-arg
      - VITE_AGENT_WS_URL=__CHAT_WS_URL__
      - ./portal

  # ─── Phase 5: Push All Images (parallel) ─────────────────────────────────
  - id: push-cortex
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-cortex
    waitFor:
      - build-cortex

  - id: push-thalamus
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-thalamus
    waitFor:
      - build-thalamus

  - id: push-mastery
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-mastery
    waitFor:
      - build-mastery

  - id: push-researcher
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-researcher
    waitFor:
      - build-researcher

  - id: push-curriculum
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-curriculum
    waitFor:
      - build-curriculum

  - id: push-integrations
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-integrations
    waitFor:
      - build-integrations

  - id: push-entity
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-entity
    waitFor:
      - build-entity

  - id: push-adk-router
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-adk-router
    waitFor:
      - build-adk-router

  - id: push-chat-service
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-chat-service
    waitFor:
      - build-chat-service

  - id: push-portal
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal
    waitFor:
      - build-portal

  # ─── Phase 6: Deploy to Cloud Run (dependency order) ─────────────────────
  # Cortex first — all other services depend on it.
  - id: deploy-cortex
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        if gcloud run services describe wisdom-cortex --region ${_REGION} --platform managed > /dev/null 2>&1; then
          gcloud run deploy wisdom-cortex \
            --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-cortex:$SHORT_SHA \
            --region=${_REGION} \
            --platform=managed \
            --no-traffic \
            --tag=canary \
            --no-allow-unauthenticated \
            --set-env-vars "GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_REGION}" \
            --set-secrets "DB_CONN_STRING=CORTEX_DB_CONN:latest" \
            --use-http2
        else
          gcloud run deploy wisdom-cortex \
            --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-cortex:$SHORT_SHA \
            --region=${_REGION} \
            --platform=managed \
            --no-allow-unauthenticated \
            --set-env-vars "GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_REGION}" \
            --set-secrets "DB_CONN_STRING=CORTEX_DB_CONN:latest" \
            --use-http2
        fi
    waitFor:
      - push-cortex

  - id: promote-cortex
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - wisdom-cortex
      - --to-latest
      - --region=${_REGION}
    waitFor:
      - deploy-cortex

  # Deploy all Go services in parallel (after Cortex is live).
  - id: deploy-mastery
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        CORTEX_URL=$(gcloud run services describe wisdom-cortex --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        gcloud run deploy wisdom-mastery \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-mastery:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --no-allow-unauthenticated \
          --set-env-vars "GCP_PROJECT_ID=$PROJECT_ID,CORTEX_GRPC_URL=$$CORTEX_URL" \
          --use-http2
    waitFor:
      - push-mastery
      - promote-cortex

  - id: deploy-researcher
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        CORTEX_URL=$(gcloud run services describe wisdom-cortex --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        gcloud run deploy wisdom-researcher \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-researcher:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --no-allow-unauthenticated \
          --set-env-vars "GCP_PROJECT_ID=$PROJECT_ID,GCS_INGESTION_BUCKET=$PROJECT_ID-wisdom-ingestion,CORTEX_GRPC_URL=$$CORTEX_URL" \
          --use-http2
    waitFor:
      - push-researcher
      - promote-cortex

  - id: deploy-curriculum
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        CORTEX_URL=$(gcloud run services describe wisdom-cortex --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        MASTERY_URL=$(gcloud run services describe wisdom-mastery --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        gcloud run deploy wisdom-curriculum \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-curriculum:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --no-allow-unauthenticated \
          --set-env-vars "GCP_PROJECT_ID=$PROJECT_ID,CORTEX_GRPC_URL=$$CORTEX_URL,MASTERY_GRPC_URL=$$MASTERY_URL" \
          --use-http2
    waitFor:
      - push-curriculum
      - promote-cortex
      - deploy-mastery

  - id: deploy-integrations
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        CORTEX_URL=$(gcloud run services describe wisdom-cortex --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        MASTERY_URL=$(gcloud run services describe wisdom-mastery --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        gcloud run deploy wisdom-integrations \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-integrations:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --no-allow-unauthenticated \
          --set-env-vars "GCP_PROJECT_ID=$PROJECT_ID,CORTEX_GRPC_URL=$$CORTEX_URL,MASTERY_GRPC_URL=$$MASTERY_URL,OBSIDIAN_MCP_URL=disabled,ANKI_MCP_URL=disabled" \
          --set-secrets "OBSIDIAN_API_KEY=OBSIDIAN_API_KEY:latest,DEFAULT_USER_ID=DEFAULT_USER_ID:latest" \
          --use-http2
    waitFor:
      - push-integrations
      - promote-cortex
      - deploy-mastery

  - id: deploy-entity
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        CORTEX_URL=$(gcloud run services describe wisdom-cortex --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        gcloud run deploy wisdom-entity \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-entity:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --no-allow-unauthenticated \
          --set-env-vars "CORTEX_GRPC_URL=$$CORTEX_URL" \
          --use-http2
    waitFor:
      - push-entity
      - promote-cortex

  # ADK Router after Mastery + Integrations are ready.
  - id: deploy-adk-router
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        CORTEX_URL=$(gcloud run services describe wisdom-cortex --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        MASTERY_URL=$(gcloud run services describe wisdom-mastery --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        RESEARCHER_URL=$(gcloud run services describe wisdom-researcher --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        CURRICULUM_URL=$(gcloud run services describe wisdom-curriculum --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        INTEGRATIONS_URL=$(gcloud run services describe wisdom-integrations --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        ENTITY_URL=$(gcloud run services describe wisdom-entity --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        
        gcloud run deploy wisdom-adk-router \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-adk-router:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --no-allow-unauthenticated \
          --set-env-vars "GCP_PROJECT_ID=$PROJECT_ID,GCP_REGION=${_REGION},CORTEX_GRPC_URL=$$CORTEX_URL,MASTERY_GRPC_URL=$$MASTERY_URL,RESEARCHER_GRPC_URL=$$RESEARCHER_URL,CURRICULUM_GRPC_URL=$$CURRICULUM_URL,INTEGRATIONS_GRPC_URL=$$INTEGRATIONS_URL,ENTITY_GRPC_URL=$$ENTITY_URL" \
          --set-secrets "MEMORY_BANK_CORPUS=MEMORY_BANK_CORPUS:latest,DEFAULT_USER_ID=DEFAULT_USER_ID:latest"
    waitFor:
      - push-adk-router
      - deploy-mastery
      - deploy-integrations

  # ─── Deploy chat_service (Python/FastAPI — after Cortex is live) ──────────
  - id: deploy-chat-service
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        CORTEX_URL=$(gcloud run services describe wisdom-cortex \
          --region ${_REGION} --format 'value(status.url)')
        gcloud run deploy wisdom-chat-service \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-chat-service:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --no-allow-unauthenticated \
          --concurrency=80 \
          --min-instances=0 \
          --max-instances=5 \
          --set-env-vars "WISDOM_ENGINE_URL=$$CORTEX_URL" \
          --set-secrets "GEMINI_API_KEY=GEMINI_API_KEY:latest"
    waitFor:
      - push-chat-service
      - promote-cortex

  # Thalamus — public gateway, only live when all backend services are ready.
  - id: deploy-thalamus
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        CORTEX_URL=$(gcloud run services describe wisdom-cortex --region ${_REGION} --format 'value(status.url)' | sed 's/https:\/\///')
        gcloud run deploy wisdom-thalamus \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-thalamus:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --set-env-vars "GCP_PROJECT_ID=$PROJECT_ID,CORTEX_GRPC_URL=$$CORTEX_URL" \
          --use-http2
    waitFor:
      - push-thalamus
      - deploy-adk-router
      - deploy-curriculum
      - deploy-entity
      - deploy-researcher

  # ─── Deploy Portal (public frontend — last, needs chat_service URL) ────────
  - id: deploy-portal
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        CORTEX_URL=$(gcloud run services describe wisdom-cortex \
          --region ${_REGION} --format 'value(status.url)')
        CHAT_URL=$(gcloud run services describe wisdom-chat-service \
          --region ${_REGION} --format 'value(status.url)')
        CORTEX_WSS=$(echo $$CORTEX_URL | sed 's/https:/wss:/')
        CHAT_WSS=$(echo $$CHAT_URL | sed 's/https:/wss:/')
        # Rebuild portal image with live URLs baked into the bundle
        gcloud builds submit ./portal \
          --config=portal/cloudbuild.yaml \
          --substitutions="_REGION=${_REGION},_REPO=${_REPO},_ENGINE_URL=$$CORTEX_URL,_AGENT_URL=$$CHAT_URL,_ENGINE_WS_URL=$$CORTEX_WSS,_AGENT_WS_URL=$$CHAT_WSS"
    waitFor:
      - deploy-chat-service
      - deploy-thalamus

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-cortex:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-thalamus:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-mastery:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-researcher:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-curriculum:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-integrations:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-entity:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-adk-router:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-chat-service:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  substitutionOption: ALLOW_LOOSE

timeout: 1800s
