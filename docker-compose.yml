version: '3.8'

services:
  wisdom-engine:
    build:
      context: ./
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - WISDOM_PORT=8080
      - WISDOM_DB_PATH=wisdom.db
    volumes:
      - wisdom_cortex:/root/

  wisdom-chat:
    build:
      context: ./chat_service
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - WISDOM_ENGINE_URL=http://wisdom-engine:8080
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - wisdom-engine

volumes:
  wisdom_cortex:
