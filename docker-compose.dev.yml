# docker-compose.dev.yml
# Local development orchestration for Wisdom Cognitive Runtime.
# Runs all Go microservices + PostgreSQL.
# The ADK Router (Python) runs separately via: cd adk-router && uvicorn main:app
# MCP servers (Obsidian, Anki) run locally on the user's machine.
#
# Usage: docker-compose -f docker-compose.dev.yml up

version: "3.9"

services:

  # ─────────────────────────────────────────────
  # Layer 5: Factual Substrate
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: wisdom-postgres
    environment:
      POSTGRES_DB: wisdom
      POSTGRES_USER: wisdom
      POSTGRES_PASSWORD: wisdom_dev_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./wisdom/pkg/cortex/schema_v2.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wisdom"]
      interval: 5s
      timeout: 5s
      retries: 5

  cortex:
    build:
      context: ./wisdom
      dockerfile: Dockerfile.cortex
    container_name: wisdom-cortex
    ports:
      - "50051:50051"
    environment:
      PORT: "50051"
      DB_CONN_STRING: "host=postgres user=wisdom password=wisdom_dev_secret dbname=wisdom sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Layer 2: Orchestration Gateway
  # ─────────────────────────────────────────────

  thalamus:
    build:
      context: ./wisdom
      dockerfile: Dockerfile.thalamus
    container_name: wisdom-thalamus
    ports:
      - "50052:50052"  # gRPC
      - "8080:8080"    # HTTP gateway for Portal and external calls
    environment:
      PORT: "50052"
      CORTEX_GRPC_URL: "cortex:50051"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID}"
    depends_on:
      - cortex

  # ─────────────────────────────────────────────
  # Layer 5: Specialized Go Microservices
  # ─────────────────────────────────────────────

  mastery:
    build:
      context: ./wisdom
      dockerfile: Dockerfile.mastery
    container_name: wisdom-mastery
    ports:
      - "50053:50053"
    environment:
      PORT: "50053"
      CORTEX_GRPC_URL: "cortex:50051"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID}"
    depends_on:
      - cortex

  researcher:
    build:
      context: ./wisdom
      dockerfile: Dockerfile.researcher
    container_name: wisdom-researcher
    ports:
      - "50054:50054"
    environment:
      PORT: "50054"
      GCS_INGESTION_BUCKET: "${GCS_INGESTION_BUCKET:-wisdom-ingestion-dev}"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID}"
    depends_on:
      - cortex

  curriculum:
    build:
      context: ./wisdom
      dockerfile: Dockerfile.curriculum
    container_name: wisdom-curriculum
    ports:
      - "50055:50055"
    environment:
      PORT: "50055"
      CORTEX_GRPC_URL: "cortex:50051"
      MASTERY_GRPC_URL: "mastery:50053"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID}"
    depends_on:
      - cortex
      - mastery

  integrations:
    build:
      context: ./wisdom
      dockerfile: Dockerfile.integrations
    container_name: wisdom-integrations
    ports:
      - "50056:50056"
    environment:
      PORT: "50056"
      CORTEX_GRPC_URL: "cortex:50051"
      MASTERY_GRPC_URL: "mastery:50053"
      # MCP servers run on the HOST machine (user's local machine), not in Docker.
      # Use host.docker.internal to reach localhost from within a container.
      OBSIDIAN_MCP_URL: "http://host.docker.internal:3333"
      ANKI_MCP_URL: "http://host.docker.internal:3334"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID}"
    depends_on:
      - cortex
      - mastery
    extra_hosts:
      - "host.docker.internal:host-gateway"

  entity:
    build:
      context: ./wisdom
      dockerfile: Dockerfile.entity
    container_name: wisdom-entity
    ports:
      - "50057:50057"
    environment:
      PORT: "50057"
      CORTEX_GRPC_URL: "cortex:50051"
    depends_on:
      - cortex

  # ─────────────────────────────────────────────
  # Layer 1: Cognitive Router (Python ADK)
  # ─────────────────────────────────────────────

  adk-router:
    build:
      context: ./adk-router
      dockerfile: Dockerfile
    container_name: wisdom-adk-router
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID}"
      GCP_REGION: "${GCP_REGION:-us-central1}"
      CORTEX_GRPC_URL: "cortex:50051"
      MASTERY_GRPC_URL: "mastery:50053"
      RESEARCHER_GRPC_URL: "researcher:50054"
      CURRICULUM_GRPC_URL: "curriculum:50055"
      INTEGRATIONS_GRPC_URL: "integrations:50056"
      ENTITY_GRPC_URL: "entity:50057"
      PUBSUB_INPUT_SUBSCRIPTION: "${PUBSUB_INPUT_SUBSCRIPTION:-adk-router-voice-input}"
      PUBSUB_ROUTING_LOG_TOPIC: "${PUBSUB_ROUTING_LOG_TOPIC:-wisdom.router.decision_logged}"
      ROUTER_MODEL: "gemini-2.0-flash"
      EXPERT_MODEL: "gemini-2.5-pro"
      MEMORY_BANK_CORPUS: "${MEMORY_BANK_CORPUS:-wisdom-memory-bank}"
      DEFAULT_USER_ID: "${DEFAULT_USER_ID:-default}"
      # GOOGLE_APPLICATION_CREDENTIALS for Vertex AI.
      GOOGLE_APPLICATION_CREDENTIALS: "/secrets/gcp-sa-key.json"
    volumes:
      - "${GCP_SA_KEY_PATH:-~/.config/gcloud/application_default_credentials.json}:/secrets/gcp-sa-key.json:ro"
    depends_on:
      - cortex
      - mastery
      - integrations


volumes:
  postgres_data:
