steps:
  # 1. Build the Portal container with build arguments
  - id: build-portal
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '.'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal:${_SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal:latest'
      - '--build-arg'
      - 'VITE_ENGINE_URL=${_ENGINE_URL}'
      - '--build-arg'
      - 'VITE_AGENT_URL=${_AGENT_URL}'
      - '--build-arg'
      - 'VITE_ENGINE_WS_URL=${_ENGINE_WS_URL}'
      - '--build-arg'
      - 'VITE_AGENT_WS_URL=${_AGENT_WS_URL}'

  # 2. Push the Portal container to Artifact Registry
  - id: push-portal
    name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal'

  # 3. Deploy the Portal to Cloud Run
  - id: deploy-portal
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wisdom-portal'
      - '--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal:${_SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'

substitutions:
  _REGION: us-central1
  _REPO: wisdom-repo
  _SHORT_SHA: latest
  _ENGINE_URL: ''
  _AGENT_URL: ''
  _ENGINE_WS_URL: ''
  _AGENT_WS_URL: ''

options:
  logging: CLOUD_LOGGING_ONLY
