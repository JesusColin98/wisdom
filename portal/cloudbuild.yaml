substitutions:
  _REGION: us-central1
  _REPO: wisdom-repo

steps:
  # ─── Install dependencies ───────────────────────────────────────────────────
  - id: npm-install
    name: node:20-slim
    entrypoint: npm
    args: [ci, --prefer-offline]
    dir: .

  # ─── Inject runtime env vars + build ────────────────────────────────────────
  # VITE vars are baked into the static bundle at build time.
  # They point to the deployed Cloud Run service URLs.
  - id: npm-build
    name: node:20-slim
    entrypoint: npm
    args: [run, build]
    dir: .
    env:
      - VITE_ENGINE_URL=https://wisdom-cortex-${PROJECT_NUMBER}.${_REGION}.run.app
      - VITE_AGENT_URL=https://wisdom-chat-service-${PROJECT_NUMBER}.${_REGION}.run.app
      - VITE_ENGINE_WS_URL=wss://wisdom-cortex-${PROJECT_NUMBER}.${_REGION}.run.app
      - VITE_AGENT_WS_URL=wss://wisdom-chat-service-${PROJECT_NUMBER}.${_REGION}.run.app
    waitFor:
      - npm-install

  # ─── Build container image ───────────────────────────────────────────────────
  - id: build-portal
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal:latest
      - .
    waitFor:
      - npm-build

  # ─── Push image ──────────────────────────────────────────────────────────────
  - id: push-portal
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal
    waitFor:
      - build-portal

  # ─── Deploy to Cloud Run (public — this is the user-facing frontend) ─────────
  - id: deploy-portal
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - wisdom-portal
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --concurrency=80
      - --min-instances=0
      - --max-instances=3
      - --port=80
    waitFor:
      - push-portal

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/wisdom-portal:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  substitutionOption: ALLOW_LOOSE

timeout: 900s
