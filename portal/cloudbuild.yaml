steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/jesus-mvp/nexusstate-repo/nexusstate-portal', '.']
  
  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/jesus-mvp/nexusstate-repo/nexusstate-portal']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nexusstate-portal'
      - '--image'
      - 'us-central1-docker.pkg.dev/jesus-mvp/nexusstate-repo/nexusstate-portal'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'us-central1-docker.pkg.dev/jesus-mvp/nexusstate-repo/nexusstate-portal'

options:
  logging: CLOUD_LOGGING_ONLY
